    <filter id="shadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="20" y="26" width="1160" height="168" rx="84" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="32" y="38" width="1136" height="54" rx="27" fill="url(#glow)"/>

  <g fill="#FFFFFF" font-family="Segoe UI, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" text-anchor="middle">
    <text x="600" y="114" font-size="66" font-weight="800" letter-spacing="1">进入智科全家桶</text>
    <text x="600" y="153" font-size="26" font-weight="600" opacity="0.95">精选资源 · 社区主页 · 一键直达</text>
  </g>

  <g transform="translate(1038 86)" fill="#FFFFFF" opacity="0.95">
    <path d="M16 0 64 24 16 48 16 31 0 31 0 17 16 17Z"/>
  </g>
