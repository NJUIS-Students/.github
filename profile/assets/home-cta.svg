<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">进入智科全家桶</title>
  <desc id="desc">精选资源、社区主页、一键直达</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4A4D1" stop-opacity="0.88"/>
      <stop offset="50%" stop-color="#B585C4" stop-opacity="0.84"/>
      <stop offset="100%" stop-color="#A772B8" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="mist" cx="50%" cy="0%" r="78%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#5d2e64" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="20" y="26" width="1160" height="168" rx="84" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="20" y="26" width="1160" height="168" rx="84" fill="url(#mist)"/>
  <rect x="32" y="38" width="1136" height="54" rx="27" fill="url(#glow)"/>
  <rect x="20.5" y="26.5" width="1159" height="167" rx="83.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="1"/>

  <g fill="#FCFAFF" font-family="Segoe UI, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" text-anchor="middle">
    <text x="600" y="110" font-size="66" font-weight="800" letter-spacing="1">进入智科全家桶</text>
    <text x="600" y="166" font-size="26" font-weight="600" opacity="0.9">精选资源 · 社区主页 · 一键直达</text>
  </g>

  <g transform="translate(1038 86)" fill="#FCFAFF" opacity="0.88">
    <path d="M16 0 64 24 16 48 16 31 0 31 0 17 16 17Z"/>
  </g>
